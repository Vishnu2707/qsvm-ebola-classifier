name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pennylane scikit-learn numpy pandas

      - name: Syntax check all modules
        run: python -m py_compile main.py src/data_prep.py src/quantum_kernel.py src/qsvm.py src/classical_baselines.py src/evaluation.py src/visualizations.py && echo "All modules OK"